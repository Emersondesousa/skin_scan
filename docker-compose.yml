version: "3.8"

services:
  backend:
    build: ./backend
    container_name: skinscan-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: skinscan-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
